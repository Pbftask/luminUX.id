<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Call UI Mobile</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color: transparent;
    font-family:Arial, sans-serif;
}

body{
    width:100%;
    height:100vh;
    overflow:hidden;
    background:black;
}

/* BACKGROUND */
.bg{
    position:fixed;
    inset:0;
    background:url("foto-saya.jpg") center/cover no-repeat;
    filter:blur(28px) brightness(0.25);
    transform:scale(1.2);
}

/* MAIN */
.container{
    position:relative;
    z-index:2;
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* TOP */
.top{
    margin-top:70px;
    text-align:center;
}

.name{
    color:white;
    font-size:20px;
    font-weight:600;
}

.time{
    margin-top:8px;
    color:#8f8f8f;
    font-size:15px;
}

/* PROFILE */
.profile{
    margin-top:120px;
    width:150px;
    height:150px;
    border-radius:50%;
    overflow:hidden;
}

.profile img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* BOTTOM PANEL */
.bottom-panel{
    position:absolute;
    bottom:30px;
    width:92%;
    height:95px;
    border-radius:18px;
    background:rgba(30,30,30,0.92);
    backdrop-filter:blur(18px);
    display:flex;
    justify-content:space-evenly;
    align-items:center;
}

/* BUTTON */
.btn{
    width:45px;
    height:45px;
    border-radius:50%;
    background:#2d2d31;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-size:20px;
    transition:0.15s;
    border:none;
}

.btn:active{
    transform:scale(0.9);
}

.end{
    background:#ff0048;
}

/* POPUP */
.popup{
    position:fixed;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.55);
    z-index:99;
}

.popup-box{
    width:80%;
    background:white;
    border-radius:14px;
    padding:25px;
    text-align:center;
}

.popup-box h2{
    font-size:22px;
    margin-bottom:12px;
}

.popup-box p{
    color:#555;
    margin-bottom:20px;
}

.close-btn{
    width:100%;
    height:50px;
    border:none;
    border-radius:14px;
    background:black;
    color:white;
    font-size:17px;
}

</style>
</head>

<body>

<!-- BG -->
<div class="bg"></div>

<!-- CONTENT -->
<div class="container">

    <div class="top">
        <div class="name">Rika</div>
        <div class="time" id="timer">00:00</div>
    </div>

    <div class="profile">
        <img src="https://i.ibb.co.com/nsWcJ08S/e634ae38ba2b1b991a103f0363f9f06b.webp">
    </div>

    <!-- BUTTONS -->
    <div class="bottom-panel">

        <button class="btn">
            <i class="fa-solid fa-flag"></i>
        </button>

        <button class="btn">
            <i class="fa-solid fa-ellipsis"></i>
        </button>

        <button class="btn">
            <i class="fa-solid fa-volume-high"></i>
        </button>

        <button class="btn">
            <i class="fa-solid fa-microphone-slash"></i>
        </button>

        <button class="btn end" onclick="showPopup()">
            <i class="fa-solid fa-phone"></i>
        </button>

    </div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">

    <div class="popup-box">

        <h2>Oops!!</h2>

        <p>
            panggilan tidak bisa berakhir,untuk mengakhiri panggilan ini butuh persetujuan dari kedua belah pihak
        </p>

        <button class="close-btn" onclick="closePopup()">
            Tutup
        </button>

    </div>

</div>

<script>

/* TIMER */

let sec = 0;

setInterval(() => {

    sec++;

    let m = Math.floor(sec / 60);
    let s = sec % 60;

    if(m < 10) m = "0" + m;
    if(s < 10) s = "0" + s;

    document.getElementById("timer").innerHTML =
    `${m}:${s}`;

},1000);

/* POPUP */

function showPopup(){
    document.getElementById("popup").style.display = "flex";
}

function closePopup(){
    document.getElementById("popup").style.display = "none";
}

if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js");
}

</script>

</body>
</html>
