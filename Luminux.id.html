<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LuminUX Music Voting</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:
    radial-gradient(circle at top,#5f7dff33,transparent 40%),
    linear-gradient(to bottom,#edf2ff,#dbe6ff);
    min-height:100vh;
    padding:20px;
    color:#111;
}

/* HEADER */

.header{
    text-align:center;
    margin-bottom:30px;
}

.logo{
    width:120px;
    margin:auto;
    filter:drop-shadow(0 0 15px #5f7dff88);
}

.title{
    font-size:34px;
    font-weight:700;
    margin-top:10px;
}

.subtitle{
    color:#555;
    font-size:14px;
}

/* CARD */

.song-list{
    display:flex;
    flex-direction:column;
    gap:20px;
}

.card{
    background:white;
    border-radius:10px;
    padding:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);

    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:15px;

    transition:0.3s;
}

.card:hover{
    transform:translateY(-3px);
}

.song-info{
    flex:1;
}

.song-title{
    font-size:20px;
    font-weight:100;
}

.vote-count{
    margin-top:6px;
    color:#555;
}

/* AUDIO */

.audio-btn{
    width:50px;
    height:50px;
    border-radius:50%;
    border:none;

    background:linear-gradient(135deg,#5065ff,#7388ff);
    color:white;

    font-size:20px;
    cursor:pointer;

    box-shadow:0 0 20px #5065ff55;
    transition:0.3s;
}

.audio-btn:hover{
    transform:scale(1.08);
}

/* RIGHT */

.right{
    display:flex;
    flex-direction:column;
    align-items:end;
    gap:10px;
}

.timer{
    font-size:20px;
    font-weight:600;
}

.vote-btn{
    border:none;
    padding:12px 24px;
    border-radius:14px;

    background:linear-gradient(135deg,#5065ff,#7388ff);
    color:white;

    font-size:18px;
    cursor:pointer;

    transition:0.3s;
}

.vote-btn:hover{
    transform:scale(1.05);
}

/* COMMENT */

.comment-box{
    margin-top:35px;
    background:white;
    border-radius:10px;
    padding:20px;

    box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.comment-title{
    text-align:center;
    font-size:32px;
    font-weight:700;
    margin-bottom:20px;
}

.comments{
    height:250px;
    overflow-y:auto;
    padding:10px;
}

.comment{
    background:#eef2ff;
    padding:12px;
    border-radius:14px;
    margin-bottom:12px;
}

.comment-input{
    display:flex;
    gap:10px;
    margin-top:20px;
}

.comment-input input{
    flex:1;
    border:none;
    outline:none;

    background:#ececec;
    width:10px;
    height: 10px;
    padding:16px;
    border-radius:30px;
    font-size:10px;
}

.comment-input button{
    border:none;
    background:linear-gradient(135deg,#5065ff,#7388ff);

    color:white;
    padding:0 30px;

    border-radius:30px;
    font-size:10px;
    cursor:pointer;
}

</style>
</head>
<body>

<div class="header">

<img class="logo"
src="https://i.ibb.co.com/7tkVzqKJ/New-Project-53-2-A88-ED6.png">

<div class="title">LuminUX</div>
<div class="subtitle">Official Music Voting Website</div>

</div>

<div class="song-list" id="songList"></div>

<div class="comment-box">

<div class="comment-title">Comment</div>

<div class="comments" id="comments"></div>

<div class="comment-input">
<input type="text" id="commentInput" placeholder="Write comment...">
<button onclick="sendComment()">Send</button>
</div>

</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
onSnapshot,
doc,
setDoc,
getDoc,
updateDoc,
increment
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {

  apiKey: "AIzaSyA4HuTmEgiowYaBH3doN2INZD5chk9NG-U",
  authDomain: "puki-678bf.firebaseapp.com",
  databaseURL: "https://puki-678bf-default-rtdb.firebaseio.com",
  projectId: "puki-678bf",
  storageBucket: "puki-678bf.firebasestorage.app",
  messagingSenderId: "343647284151",
  appId: "1:343647284151:web:c26e7f5f75235c187a1632"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* SONG DATA */

const songs = [

{
id:"song1",
title:"cosmic light",
audio:"music1.mp3"
},

{
id:"song2",
title:"Night Sky",
audio:"music2.mp3"
},

{
id:"song3",
title:"Lost Memory",
audio:"music3.mp3"
}

];

const songList =
document.getElementById("songList");

/* CREATE DOCS */

async function createVoteDocs(){

for(const song of songs){

const ref = doc(db,"votes",song.id);

const snap = await getDoc(ref);

if(!snap.exists()){

await setDoc(ref,{
count:0
});

}

}

}

createVoteDocs();

/* RENDER SONGS */

songs.forEach(song=>{

songList.innerHTML += `

<div class="card">

<div class="song-info">

<div class="song-title">
${song.title}
</div>

<div class="vote-count"
id="vote-${song.id}">
Jumlah voting : 0
</div>

</div>

<button class="audio-btn"
onclick="playAudio('${song.audio}')">
▶
</button>

<div class="right">

<button class="vote-btn"
onclick="vote('${song.id}')">
Voting
</button>

</div>

</div>

`;

});

/* AUDIO */

window.playAudio = function(src){

const audio = new Audio(src);

audio.play();

}

/* VOTE */

window.vote = async function(id){

/* CHECK */

const voted =
localStorage.getItem("voted_" + id);

if(voted){

alert("Kamu sudah voting lagu ini!");
return;

}

/* UPDATE FIREBASE */

const ref = doc(db,"votes",id);

await updateDoc(ref,{
count:increment(1)
});

/* SAVE */

localStorage.setItem(
"voted_" + id,
"true"
);

alert("Voting berhasil!");

}

/* REALTIME VOTES */

songs.forEach(song=>{

const ref = doc(db,"votes",song.id);

onSnapshot(ref,(snap)=>{

if(snap.exists()){

document.getElementById(
`vote-${song.id}`
).innerText =
"Jumlah voting : " +
snap.data().count;

}

});

});

/* COMMENTS */

const commentsDiv =
document.getElementById("comments");

onSnapshot(
collection(db,"comments"),
(snapshot)=>{

commentsDiv.innerHTML = "";

snapshot.forEach(doc=>{

commentsDiv.innerHTML += `

<div class="comment">
${doc.data().text}
</div>

`;

});

});

/* SEND COMMENT */

window.sendComment = async function(){

const input =
document.getElementById("commentInput");

if(input.value.trim() == "") return;

await addDoc(
collection(db,"comments"),
{
text:input.value
}
);

input.value = "";

}

</script>

</script>

</body>
</html>
